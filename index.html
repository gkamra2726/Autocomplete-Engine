<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Core Text Engine</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
            --border-color: rgba(255, 255, 255, 0.08);
            --suggest-hover: rgba(99, 102, 241, 0.15);
            --badge-bg: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-card {
            width: 100%;
            max-width: 720px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            padding: 40px;
        }

        header {
            margin-bottom: 32px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .input-box-container {
            position: relative;
            margin-bottom: 24px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 16px 22px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        input[type="text"] {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 18px;
            width: 100%;
        }

        input[type="text"]::placeholder {
            color: #475569;
        }

        .suggestions-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            height: 260px;
            visibility: hidden;
        }

        .suggestions-header {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.02);
            font-size: 11px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        #suggestionsList {
            height: calc(100% - 38px);
            overflow-y: auto;
        }

        .suggestion-item {
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s ease;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background-color: var(--suggest-hover);
        }

        .suggestion-word {
            font-size: 16px;
            color: var(--text-main);
            font-weight: 500;
        }

        .badge-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .freq-badge {
            font-size: 11px;
            background: var(--badge-bg);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 20px;
            font-family: monospace;
        }

        .tab-badge {
            font-size: 11px;
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        footer {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .status-pill::before {
            content: "";
            width: 6px;
            height: 6px;
            background-color: var(--success-color);
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <div class="app-card">
        <header>
            <h1>Predictive Text Engine</h1>
            <p>Adaptive Robust Self-Learning Core</p>
        </header>

        <div class="input-box-container">
            <div class="input-wrapper">
                <input type="text" id="textInput" placeholder="Try: 'C' -> 'Co' -> 'COM'..." autofocus
                    autocomplete="off">
            </div>
        </div>

        <div class="suggestions-card" id="suggestionsContainer">
            <div class="suggestions-header">Predictions & Metrics</div>
            <div id="suggestionsList"></div>
        </div>

        <footer>
            <div class="status-pill">System Operational</div>
            <div style="padding-top: 4px;">C++ WebAssembly Module</div>
        </footer>
    </div>

    <script src="engine.js"></script>
    <script>
        let querySuggestionsWASM = null;
        let incrementFrequencyWASM = null;

        Module.onRuntimeInitialized = function () {
            querySuggestionsWASM = Module.cwrap('query_suggestions', 'string', ['string']);
            incrementFrequencyWASM = Module.cwrap('increment_word_frequency', null, ['string']);
            Module.ccall('init_dictionary', null, [], []);
        };

        const textInput = document.getElementById('textInput');
        const container = document.getElementById('suggestionsContainer');
        const list = document.getElementById('suggestionsList');

        let topSuggestionToken = "";

        function formatScore(score) {
            if (score >= 1000000) return (score / 1000000).toFixed(1) + 'M';
            if (score >= 1000) return (score / 1000).toFixed(1) + 'K';
            return score;
        }

        // Advanced Casing Matrix Engine
        function applySmartCasing(rawWord, userToken) {
            if (!userToken) return rawWord;

            // Step 1: Count how many capital letters the user has currently typed in this token
            let capitalCount = 0;
            for (let i = 0; i < userToken.length; i++) {
                const char = userToken[i];
                if (char === char.toUpperCase() && char !== char.toLowerCase()) {
                    capitalCount++;
                }
            }

            // Condition A: If there's MORE THAN ONE capital letter typed (e.g., "CO", "COM", "COm") -> Force ALL CAPS
            if (capitalCount > 1) {
                return rawWord.toUpperCase();
            }

            // Condition B: Exactly one capital letter AND it's the very first character -> Title Case
            if (capitalCount === 1 && userToken[0] === userToken[0].toUpperCase() && userToken[0] !== userToken[0].toLowerCase()) {
                return rawWord.charAt(0).toUpperCase() + rawWord.slice(1).toLowerCase();
            }

            // Condition C: Default fallback to lowercase
            return rawWord.toLowerCase();
        }

        textInput.addEventListener('input', (e) => {
            const fullText = e.target.value;

            if (!fullText) {
                container.style.visibility = 'hidden';
                list.innerHTML = '';
                topSuggestionToken = "";
                return;
            }

            const wordsArray = fullText.match(/\S+/g) || [];
            if (wordsArray.length === 0 || fullText.endsWith(' ')) {
                container.style.visibility = 'hidden';
                topSuggestionToken = "";
                return;
            }

            const rawActiveToken = wordsArray[wordsArray.length - 1];
            const cleanSearchToken = rawActiveToken.toLowerCase();

            if (!cleanSearchToken || !querySuggestionsWASM) {
                container.style.visibility = 'hidden';
                return;
            }

            const rawResponseStr = querySuggestionsWASM(cleanSearchToken);

            if (!rawResponseStr || rawResponseStr === "") {
                container.style.visibility = 'hidden';
                list.innerHTML = '';
                topSuggestionToken = "";
                return;
            }

            const items = rawResponseStr.split('|');
            list.innerHTML = '';

            items.forEach((item, index) => {
                const parts = item.split(':');
                if (parts.length === 2) {
                    const baselineTerm = parts[0];
                    const score = parseInt(parts[1]);

                    const casedTerm = applySmartCasing(baselineTerm, rawActiveToken);

                    if (index === 0) topSuggestionToken = casedTerm;

                    const row = document.createElement('div');
                    row.className = 'suggestion-item';

                    if (index === 0) {
                        row.style.borderLeft = '4px solid var(--accent-color)';
                        row.style.background = 'rgba(255, 255, 255, 0.02)';
                    }

                    const wordSpan = document.createElement('span');
                    wordSpan.className = 'suggestion-word';
                    wordSpan.textContent = casedTerm;

                    const badgeContainer = document.createElement('div');
                    badgeContainer.className = 'badge-container';

                    const scoreBadge = document.createElement('span');
                    scoreBadge.className = 'freq-badge';
                    scoreBadge.textContent = `Score: ${formatScore(score)}`;
                    badgeContainer.appendChild(scoreBadge);

                    if (index === 0) {
                        const tabBadge = document.createElement('span');
                        tabBadge.className = 'tab-badge';
                        tabBadge.textContent = '⇥ Tab';
                        badgeContainer.appendChild(tabBadge);
                    }

                    row.appendChild(wordSpan);
                    row.appendChild(badgeContainer);

                    row.onclick = () => {
                        executeWordCompletion(casedTerm);
                    };
                    list.appendChild(row);
                }
            });

            container.style.visibility = list.children.length > 0 ? 'visible' : 'hidden';
        });

        function executeWordCompletion(wordToInsert) {
            if (!wordToInsert) return;

            if (incrementFrequencyWASM) {
                incrementFrequencyWASM(wordToInsert.toLowerCase());
            }

            const fullText = textInput.value;
            const lastSpaceIndex = fullText.trimEnd().lastIndexOf(' ');

            let baseText = "";
            if (lastSpaceIndex !== -1) {
                baseText = fullText.substring(0, lastSpaceIndex + 1);
            }

            textInput.value = baseText + wordToInsert + ' ';
            container.style.visibility = 'hidden';
            topSuggestionToken = "";
            textInput.focus();
        }

        textInput.addEventListener('keydown', (e) => {
            if (container.style.visibility === 'visible' && topSuggestionToken !== "") {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    executeWordCompletion(topSuggestionToken);
                }
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.app-card')) {
                container.style.visibility = 'hidden';
            }
        });
    </script>
</body>

</html>
